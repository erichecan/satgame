name: Deploy satgame to Cloud Run

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      PROJECT_ID: supply-491510
      REGION: us-central1
      SERVICE_NAME: satgame
      IMAGE: us-central1-docker.pkg.dev/supply-491510/satgame/app:${{ github.sha }}

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps for migration step
        run: npm install

      - name: Run database migrations
        run: |
          DATABASE_URL=$(gcloud secrets versions access latest --secret=satgame-database-url --project=${{ env.PROJECT_ID }})
          echo "::add-mask::$DATABASE_URL"
          DATABASE_URL="$DATABASE_URL" npx prisma migrate deploy

      - name: Build image
        run: docker build -t ${{ env.IMAGE }} .

      - name: Push image
        run: docker push ${{ env.IMAGE }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.IMAGE }} \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} \
            --allow-unauthenticated \
            --min-instances=0 --max-instances=3 \
            --cpu=0.5 --memory=512Mi \
            --set-secrets="DATABASE_URL=satgame-database-url:latest,JWT_SECRET=satgame-jwt-secret:latest,ACCESS_PASSCODE=satgame-access-passcode:latest" \
            --quiet

      - name: Verify deployment
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region ${{ env.REGION }} --project ${{ env.PROJECT_ID }} \
            --format="value(status.url)")
          echo "Deployed to: $URL"
          echo "SERVICE_URL=$URL" >> "$GITHUB_ENV"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL/")
          echo "HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::error::Home page did not return 200 (got $STATUS)"
            exit 1
          fi
